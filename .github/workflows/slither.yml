name: Slither

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  slither:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Slither
        run: pip3 install slither-analyzer

      - name: Build
        run: forge build

      - name: Run Slither
        run: slither . --exclude-dependencies --exclude-informational