specVersion: 1.0.0

schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: AMM
    network: arbitrum-sepolia
    source:
      address: "0x94099942864EA81cCF197E9D71ac53310b1468D8"
      abi: AMM
      startBlock: 0

    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript

      entities:
        - Swap
        - LiquidityAdded

      abis:
        - name: AMM
          file: ./abis/AMM.json

      eventHandlers:
        - event: Swap(indexed address,indexed address,indexed address,uint256,uint256,uint256,uint256)
          handler: handleSwap

        - event: LiquidityAdded(indexed address,uint256,uint256,uint256,uint256)
          handler: handleLiquidityAdded

      file: ./src/amm.ts